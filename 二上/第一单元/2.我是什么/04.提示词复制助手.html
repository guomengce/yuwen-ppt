      if (!event.target.matches("button.copy")) return;
      const list = event.target.dataset.panel === "bg" ? bgPrompts : compositePrompts;
      await navigator.clipboard.writeText(list[Number(event.target.dataset.index)].prompt);
      event.target.textContent = "已复制";
      event.target.classList.add("done");
      setTimeout(() => { event.target.textContent = "复制"; event.target.classList.remove("done"); }, 1200);
    });
  </script>
</body>
</html>
